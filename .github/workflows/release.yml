name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    uses: 9orky/modwire/.github/workflows/python-release-build.yml@workflows-v1
    with:
      release-tag: ${{ github.event.release.tag_name }}
      python-version: "3.12"

  publish-github-assets:
    needs: build
    uses: 9orky/modwire/.github/workflows/python-release-assets.yml@workflows-v1
    with:
      release-tag: ${{ github.event.release.tag_name }}
    permissions:
      contents: write

  publish-pypi:
    needs: [build, publish-github-assets]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/modwire-siren/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
